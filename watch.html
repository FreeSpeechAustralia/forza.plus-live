<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forza | Watch</title>
  <link rel="icon" type="image/png" href="Branding/favicon.png?v=20260303-new-mark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260303-mobile-bg-jpg-bust" />
</head>
<body>
  <canvas id="nebula-canvas" aria-hidden="true"></canvas>

  <header class="header-shell" id="top">
    <a class="logo" href="index.html#top">
      <img src="Branding/logo.png" alt="Forza" />
    </a>

    <button class="nav-toggle" aria-expanded="false" aria-controls="header-nav">
      <span></span><span></span><span></span>
      <span class="sr-only">Toggle navigation</span>
    </button>

    <nav id="header-nav" class="header-nav" aria-label="Primary navigation">
      <a href="watch.html" aria-current="page">Watch</a>
      <a href="posts.html">Posts</a>
      <a href="exclusive.html">Exclusive</a>
      <a href="donate.html">Donate</a>
    </nav>

    <a class="accounts" href="accounts.html" aria-label="Accounts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M5 20c1.6-3.6 4.5-5.2 7-5.2S17.4 16.4 19 20"></path>
      </svg>
      <span>Accounts</span>
    </a>
  </header>

  <main class="streams-main">
    <section class="watch-profile-layout">
      <article class="glass profile-card kick-profile-card" aria-labelledby="kick-profile-title">
        <img src="Assets/kick-logo.jpg" alt="" class="kick-profile-logo" aria-hidden="true" />
        <div class="profile-head kick-profile-head">
          <div class="profile-avatar" aria-hidden="true">
            <img src="Assets/kick-photo.png" alt="" class="profile-avatar-image" />
          </div>
          <div class="kick-profile-meta">
            <h2 id="kick-profile-title">forzzza</h2>
            <p class="profile-handle">kick.com/forzzza</p>
          </div>
          <a href="https://kick.com/forzzza" class="kick-follow-btn" target="_blank" rel="noopener noreferrer">Follow</a>
        </div>
        <p class="profile-copy">The primary home for live streams, direct chat, and uncensored updates.</p>
        <div class="profile-actions">
          <a href="https://kick.com/forzzza" class="btn primary" target="_blank" rel="noopener noreferrer">Watch on Kick</a>
        </div>
      </article>
    </section>

    <section class="streams-hero glass reveal visible">
      <div>
        <p class="label">Watch</p>
        <a href="https://rumble.com" target="_blank" rel="noopener noreferrer" aria-label="Open Rumble" class="streams-hero-logo-link">
          <img src="Assets/rumble-logo.png" alt="Rumble" class="streams-hero-logo" />
        </a>
        <h1>Stream Archive</h1>
        <p class="copy">All kick streams archived on Rumble for your convenience.</p>
      </div>
      <div class="sort-panel">
        <label for="sortSelect">Sort by</label>
        <select id="sortSelect" aria-label="Sort videos">
          <option value="latest" selected>Latest</option>
          <option value="oldest">Oldest</option>
          <option value="title">Title (A-Z)</option>
        </select>
        <p id="videoCount">0 videos</p>
      </div>
    </section>

    <section id="videoGrid" class="video-grid" aria-live="polite"></section>
  </main>

  <script src="watch.js"></script>
</body>
</html>
