<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forza | Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20250301-p" />
</head>
<body>
  <canvas id="nebula-canvas" aria-hidden="true"></canvas>

  <header class="header-shell" id="top">
    <a class="logo" href="index.html#top">
      <img src="Branding/logo.png" alt="Forza" />
    </a>

    <button class="nav-toggle" aria-expanded="false" aria-controls="header-nav">
      <span></span><span></span><span></span>
      <span class="sr-only">Toggle navigation</span>
    </button>

    <nav id="header-nav" class="header-nav" aria-label="Primary navigation">
      <a href="watch.html" aria-current="page">Watch</a>
      <a href="posts.html">Posts</a>
      <a href="index.html#shop">Shop</a>
      <a href="index.html#shop">Exclusive</a>
      <a href="donate.html">Donate</a>
    </nav>

    <a class="accounts" href="#accounts" aria-label="Accounts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M5 20c1.6-3.6 4.5-5.2 7-5.2S17.4 16.4 19 20"></path>
      </svg>
      <span>Accounts</span>
    </a>
  </header>

  <main class="streams-main">
    <section class="streams-hero glass reveal visible">
      <div>
        <p class="label">Watch</p>
        <h1>Rumble stream archive</h1>
        <p class="copy">Embedded listings from the channel feed, designed with the same deep-space SaaS shell.</p>
      </div>
      <div class="sort-panel">
        <label for="sortSelect">Sort by</label>
        <select id="sortSelect" aria-label="Sort videos">
          <option value="latest" selected>Latest</option>
          <option value="oldest">Oldest</option>
          <option value="title">Title (A-Z)</option>
        </select>
        <p id="videoCount">0 videos</p>
      </div>
    </section>

    <section id="videoGrid" class="video-grid" aria-live="polite"></section>
  </main>

  <script src="watch.js"></script>
</body>
</html>
